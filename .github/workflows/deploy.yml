name: Deploy Vite app to GitHub Pages

on:
  # Deploy automatically when code is pushed to main
  push:
    branches: [main]

  # Allow manual deploys from the Actions tab in GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deploy at a time; cancel any in-progress run if a new one starts
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
