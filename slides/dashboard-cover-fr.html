<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cover - L'activité des entreprises au Canada</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>

  <!-- body.theme-dark activates the dark-background overrides in main.css -->

  <body class="theme-dark">
    <!-- ── HEADER ─────────────────────────────────────────────────────── -->
    <div class="slide-header">
      <div class="goc-wordmark" aria-label="Government of Canada"></div>
      <div class="slide-source">
        <div class="slide-source-item">
          Statistics Canada | Open Government Portal
        </div>
        <div class="slide-source-item">
          Statistique Canada | Portail du gouvernement ouvert
        </div>
      </div>
    </div>

    <!-- ── RED ACCENT BAR ─────────────────────────────────────────────── -->
    <div class="accent-bar" aria-hidden="true"></div>

    <!-- ── HERO ──────────────────────────────────────────────────────── -->
    <div class="hero">
      <h1>L'activité des entreprises au Canada</h1>
      <p class="accent-title">Une décennie en données</p>
    </div>

    <!-- ── DIVIDER ────────────────────────────────────────────────────── -->
    <div class="divider" aria-hidden="true"></div>

    <!-- ── SLIDE PREVIEW ─────────────────────────────────────────────── -->
    <p class="description">Cover TBD</p>

    <script src="../js/wordmark.js"></script>
  </body>
</html>
